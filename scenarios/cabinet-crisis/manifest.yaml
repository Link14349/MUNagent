id: cabinet-crisis
title: 三人内阁危机
author: munagent
version: 1.0.0
created: "2026-07-12"
language: zh
start_story_time: "2026-03-15T09:00:00+08:00"
description: 邻国边境军演引发的三人内阁危机推演，考验外交降级与军事威慑之间的抉择。
content: |
  邻国在争议边境增兵并实弹演习，内阁在总理、国防部长、外交部长三人之间分裂：
  一方主张先外交降级、一方要求展示军事决心。代表需在议会质询、媒体舆论与对方定调的多重压力下，
  通过指令推动联合或对抗路线。推演从 2026-03-15 晨间内阁紧急会议开始，外部事件按危机弧线逐步逼近，
  终局由时限到达或 DM 判定关键政治结果触发。适合观察多席位博弈与危机联动节奏。
