main_arc:
  - id: border_skirmish
    trigger: "time >= 2026-03-15T13:00:00+08:00"      # 绝对时间, 到点必发; 第一次外部冲击, 检验内阁反应速度
    content: |
      边境传来消息: 邻国军队在争议地区进行实弹演习, 双方边防部队发生对峙.
      外交界担忧局势可能升级为局部冲突.
    default_scope: global

  - id: parliament_window
    trigger: "time >= border_skirmish + 2h"            # 线性链: 事发 2 小时后国内政治入场
    content: |
      议会就边境对峙召开紧急质询, 反对党要求内阁公开表态是否强硬回应.
    default_scope: global

  - id: evening_news_frame
    trigger: "time >= parliament_window + 3h"          # 18:00 前后: 对方舆论定调, 回旋空间收窄
    content: |
      邻国官方晚间新闻就此次对峙定调, 舆论压力骤增, 内阁的回旋空间开始收窄.
    default_scope: global

  - id: diplomatic_backchannel                         # 分支一(降级走向); ≈ story_design.md A线(外交解局线)
    trigger: "time >= evening_news_frame + 1h and time < 2026-03-16T09:00:00+08:00"  # 外交窗口: 对方内阁定调前才有意义
    condition: "text '内阁已通过外交渠道推动降级或与邻国实质接触'"
    content: |
      邻国通过秘密渠道释放缓和信号, 但国内鹰派对此强烈不满, 指责内阁软弱.
    default_scope: global

  - id: escalation_night_patrol                        # 分支二: 同一陈述取反, 与分支一互斥; ≈ story_design.md C线(摩擦升级线)
    trigger: "time >= evening_news_frame + 3h"          # 21:00 前后: 夜间走火高危时段
    condition: "not text '内阁已通过外交渠道推动降级或与邻国实质接触'"
    content: |
      夜间侦察对峙加剧, 前线指挥官请求扩大交火规则, 走火风险骤升.
    default_scope: global

  - id: neighbor_cabinet_meeting                       # 收敛: 无论我方走哪条线, 对方内阁都会开会定调, 此前所有信号在此结算
    trigger: "time >= 2026-03-16T09:00:00+08:00"
    content: |
      邻国召开内阁会议, 就此前一系列信号最终定调回应路线.
    default_scope: global

random_pool:
  - id: media_leak
    weight: 3
    content: 外国媒体披露内阁内部在战和问题上存在严重分歧.
  - id: neighbor_offer
    weight: 2
    content: 邻国通过第三方释放信号, 愿意重启外交对话.

end_conditions:
  - type: story_time_reached
    at: "2026-03-16T18:00:00+08:00"
  - type: dm_judgement
    desc: "总理被罢免, 或内阁通过紧急状态令, 或三方达成妥协方案"
